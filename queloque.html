<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- EVITA ZOOM EN CELULAR -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Input Simple</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      background:#f5f5f5;
    }

    input{
      width:300px;
      padding:15px;
      
      /* IMPORTANTE:
         16px evita zoom automático en muchos celulares */
      font-size:16px;

      border:2px solid #ccc;
      border-radius:10px;
      outline:none;
    }

    input:focus{
      border-color:#2596be;
    }
  </style>
</head>
<body>

  <input type="text" placeholder="Escribe aquí..." />

</body>
</html>
