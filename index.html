<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Input sin zoom</title>

<style>

body{
  font-family:Arial;
  padding:40px;
}

/* 🔥 INPUT */
input{

  width:300px;

  padding:12px;

  /* 🔥 CLAVE */
  font-size:16px;

  border:2px solid #999;
  border-radius:8px;

  outline:none;

  /* 🔥 FIX ANDROID */
  appearance:none;
  -webkit-appearance:none;

  transform:translateZ(0);

  touch-action:manipulation;
}

</style>
</head>

<body>

<input
  type="text"
  placeholder="Escribe aquí..."
  autocomplete="off"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
>

</body>
</html>
