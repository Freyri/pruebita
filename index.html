<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fix Zoom Android</title>

<style>

html,
body{
  margin:0;
  padding:40px;
  font-family:Arial;
}

/* 🔥 CONTENEDOR */
.inputWrap{

  /* tamaño visual */
  width:300px;
  height:50px;

  overflow:hidden;
}

/* 🔥 TRUCO REAL */
#txt{

  width:400px;

  /* grande para evitar zoom */
  font-size:32px;

  padding:10px;

  border:2px solid #999;
  border-radius:8px;

  outline:none;

  appearance:none;
  -webkit-appearance:none;

  transform-origin:left top;

  /* 🔥 lo reduces visualmente */
  transform:scale(0.5);

}

</style>
</head>

<body>

<div class="inputWrap">

  <input
    id="txt"
    type="text"
    placeholder="Escribe..."
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
  >

</div>

</body>
</html>
