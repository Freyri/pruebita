<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ESTO ES LA CLAVE -->
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Input Fijo</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;

  /* EVITA ZOOM Y MOVIMIENTOS RAROS */
  touch-action:manipulation;

  background:#000;
  font-family:Arial,sans-serif;
}

/* BARRA SUPERIOR */
.top{
  width:100%;
  padding:14px;
  background:#000;

  /* SE QUEDA FIJO */
  position:fixed;
  top:0;
  left:0;
  z-index:999;
}

/* INPUT EXACTO TIPO PAGINA REAL */
#busqueda{
  width:100%;
  height:58px;

  font-size:20px; /* IMPORTANTE */
  
  padding:0 18px;

  border:2px solid #cfcfcf;
  border-radius:0;

  outline:none;

  /* EVITA APARIENCIA IOS */
  appearance:none;
  -webkit-appearance:none;

  transform:translateZ(0);
}

/* EVITA ZOOM EN IOS */
input,
textarea,
select{
  font-size:16px;
}

.contenido{
  margin-top:90px;
  height:2000px;
  background:#f5f5f5;
}

</style>
</head>

<body>

<div class="top">
  <input
    type="text"
    id="busqueda"
    placeholder="Buscar en catalogo"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false">
</div>

<div class="contenido"></div>

</body>
</html>
